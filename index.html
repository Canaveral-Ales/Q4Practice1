<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Practice 1</title>
</head>
<body>
    
    <h1>JavaScript Conditional Statements</h1>

    <input type="text" class="form-control" id="Age" placeholder="Type here...">

    <button class=""btn btn-info" onclick="checkAge()">Submit</button>

    <script>
        function checkAge(){
            var Age = document.getElementById("Age").value;
           
     if (isNaN (Age) || Age < 0 )
     alert("Please input a valid number.");
  
      else if (Age > 18){
        alert("You are of legal age.");
        }

        else {
         alert("Age could not be determined.");
        }
     }
    </script>
</body>
</html>
